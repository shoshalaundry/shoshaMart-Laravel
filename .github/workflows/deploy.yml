name: Deploy Laravel-React to Hostinger (FTP + Webhook)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Composer Dependencies
        run: composer install --optimize-autoloader --no-dev --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Vite Assets
        run: |
          npm ci
          npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./
          # Path absolut di server Hostinger (pastikan diakhiri /)
          server-dir: domains/shoshamartv2.shoshalaundry.id/laravel_core/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/storage/logs/**

      - name: Run Artisan Commands via Webhook
        run: |
          echo "Triggering Deployment Webhook..."
          curl -s "https://shoshamartv2.shoshalaundry.id/deploy_api.php?token=SHOSHA_MART_DEPLOY_SECRET_XYZ"